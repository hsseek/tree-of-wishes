<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Tree of Wishes{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="/static/css/main.css?v={{ sv }}" />
  {% block extra_head %}{% endblock %}
</head>
<body class="season-{{ season | default('summer') }} {% block body_class %}{% endblock %}">

<header class="site-header">
  <nav class="nav-left">
    <a href="/tree" class="nav-link nav-primary {% if active_page == 'tree' %}active{% endif %}" data-i18n="nav.tree">Tree of Wishes</a>
    <a href="/columbarium" class="nav-link nav-primary {% if active_page == 'columbarium' %}active{% endif %}" data-i18n="nav.columbarium">Columbarium</a>
  </nav>
  <div class="nav-spacer"></div>
  <nav class="nav-right">
    <a href="/my-wishes" class="nav-link {% if active_page == 'my-wishes' %}active{% endif %}" data-i18n="nav.myWishes">My Wishes</a>
    <a href="/about" class="nav-link {% if active_page == 'about' %}active{% endif %}" data-i18n="nav.about">About</a>
    <button id="btn-report-nav" class="nav-link nav-btn" data-i18n="nav.report">Report</button>
    {% if current_user %}
      <a href="/auth/logout" class="nav-link" data-i18n="nav.signOut">Sign Out</a>
    {% endif %}
    <button id="lang-toggle">한국어</button>
  </nav>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" aria-expanded="false" aria-controls="nav-mobile-menu">☰</button>
</header>

<div id="nav-mobile-menu" class="nav-mobile-menu" aria-hidden="true">
  <a href="/my-wishes" class="nav-link{% if active_page == 'my-wishes' %} active{% endif %}" data-i18n="nav.myWishes">My Wishes</a>
  <a href="/about" class="nav-link{% if active_page == 'about' %} active{% endif %}" data-i18n="nav.about">About</a>
  <button id="btn-report-mobile" class="nav-link nav-btn" data-i18n="nav.report">Report</button>
  {% if current_user %}
    <a href="/auth/logout" class="nav-link" data-i18n="nav.signOut">Sign Out</a>
  {% endif %}
  <button id="lang-toggle-mobile" class="nav-link nav-lang-btn">한국어</button>
</div>

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<!-- Shared modal -->
<div id="modal-backdrop"></div>
<div id="wish-modal" role="dialog" aria-modal="true">
  <div class="modal-header">
    <h3>✦</h3>
    <button class="modal-close" aria-label="Close">×</button>
  </div>
  <div class="modal-body"></div>
</div>

<!-- Report overlay -->
<div id="report-overlay" aria-modal="true" role="dialog">
  <div class="new-wish-panel">
    <h2 data-i18n="report.title">Report / Suggest</h2>
    <form id="report-form">
      <div class="form-field">
        <label data-i18n="report.typeLabel">Type</label>
        <select name="type" id="report-type">
          <option value="abuse" data-i18n="report.typeAbuse">Report abuse</option>
          <option value="suggestion" data-i18n="report.typeSuggestion">Suggestion</option>
        </select>
      </div>
      <div class="form-field">
        <label data-i18n="report.messageLabel">Message</label>
        <textarea name="message" rows="5" required
          data-i18n-placeholder="report.messagePlaceholder"
          placeholder="Describe the issue or your suggestion…"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" id="btn-report-cancel" class="btn-secondary" data-i18n="btn.cancel">Cancel</button>
        <button type="submit" id="btn-report-submit" class="btn-primary" data-i18n="report.submit">Send</button>
      </div>
    </form>
  </div>
</div>

<script>const CURRENT_USER_ID = {{ current_user.id if current_user else 'null' }}; const TOW_USER_LANG = {{ ('"' + current_user.language + '"') if current_user and current_user.language else 'null' }}; const IS_ADMIN = {{ 'true' if is_admin else 'false' }}; const TOW_SV = '{{ sv }}'; window.TOW_LANG = '{{ lang }}'; window.TOW_TRANSLATIONS = {{ translations_json | safe }};</script>
<script src="/static/js/i18n.js?v={{ sv }}"></script>
<script>
(function () {
  function _showToast(msg, type) {
    var toast = document.createElement('div');
    toast.className = 'toast toast-' + (type || 'info');
    toast.textContent = msg;
    document.body.appendChild(toast);
    requestAnimationFrame(function () { toast.classList.add('toast-show'); });
    setTimeout(function () {
      toast.classList.remove('toast-show');
      setTimeout(function () { toast.remove(); }, 400);
    }, 2800);
  }
  window._showToast = _showToast;

  var menu, hamburger;
  document.addEventListener('DOMContentLoaded', function () {
    menu      = document.getElementById('nav-mobile-menu');
    hamburger = document.getElementById('nav-hamburger');

    hamburger && hamburger.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = menu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', String(open));
      menu.setAttribute('aria-hidden', String(!open));
    });

    document.addEventListener('click', function () {
      if (menu && menu.classList.contains('open')) {
        menu.classList.remove('open');
        hamburger && hamburger.setAttribute('aria-expanded', 'false');
        menu.setAttribute('aria-hidden', 'true');
      }
    });

    menu && menu.addEventListener('click', function (e) { e.stopPropagation(); });

    /* Mobile lang button delegates to the desktop button so all existing
       per-page handlers (app.js, settings.js, etc.) fire exactly once. */
    var mobileLang = document.getElementById('lang-toggle-mobile');
    mobileLang && mobileLang.addEventListener('click', function () {
      menu && menu.classList.remove('open');
      var desktop = document.getElementById('lang-toggle');
      desktop && desktop.click();
    });

    /* Report overlay */
    var reportOverlay = document.getElementById('report-overlay');
    var reportForm    = document.getElementById('report-form');

    function openReport() {
      menu && menu.classList.remove('open');
      reportOverlay && reportOverlay.classList.add('open');
    }
    function closeReport() {
      reportOverlay && reportOverlay.classList.remove('open');
    }

    document.getElementById('btn-report-nav')    && document.getElementById('btn-report-nav').addEventListener('click', openReport);
    document.getElementById('btn-report-mobile') && document.getElementById('btn-report-mobile').addEventListener('click', openReport);
    document.getElementById('btn-report-cancel') && document.getElementById('btn-report-cancel').addEventListener('click', closeReport);

    reportOverlay && reportOverlay.addEventListener('click', function (e) {
      if (e.target === reportOverlay) closeReport();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && reportOverlay && reportOverlay.classList.contains('open')) closeReport();
    });

    reportForm && reportForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('btn-report-submit');
      btn.textContent = i18n.t('report.sending');
      btn.disabled = true;

      var fd = new FormData(reportForm);
      try {
        var resp = await fetch('/api/report', { method: 'POST', body: fd });
        if (resp.ok) {
          closeReport();
          reportForm.reset();
          _showToast(i18n.t('report.success'), 'success');
        } else {
          _showToast(i18n.t('report.error'), 'error');
        }
      } catch (_) {
        _showToast(i18n.t('report.error'), 'error');
      }
      btn.textContent = i18n.t('report.submit');
      btn.disabled = false;
    });
  });

  /* Keep mobile button label in sync whenever the language changes. */
  document.addEventListener('langchange', function (e) {
    var btn = document.getElementById('lang-toggle-mobile');
    if (btn) btn.textContent = e.detail.lang === 'en' ? '한국어' : 'English';
  });
})();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
